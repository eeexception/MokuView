name: Build DMG

on:
  push:
    tags:
      - 'release-v*' # Triggered on release tags like release-v1.0.0
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Make scripts executable
        run: chmod +x tools/*.sh

      - name: Build App
        run: ./tools/build.sh
        env:
          # Disable code signing for CI if certificates are not set up in Secrets
          CODE_SIGNING_ALLOWED: NO

      - name: Create DMG
        run: ./tools/build_dmg.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: MokuView-DMG
          path: build/*.dmg
          if-no-files-found: error
