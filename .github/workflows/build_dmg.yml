name: Build DMG

on:
  push:
    tags:
      - 'release-v*' # Срабатывает при пуше тегов release-v1.0 и т.д.
  workflow_dispatch: # Позволяет запустить сборку вручную через интерфейс GitHub

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Make scripts executable
        run: chmod +x tools/*.sh

      - name: Build App
        run: ./tools/build.sh
        env:
          # Для CI отключаем подпись кода, если у вас не настроены сертификаты в секретах GitHub
          CODE_SIGNING_ALLOWED: NO

      - name: Create DMG
        run: ./tools/build_dmg.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: MokuView-DMG
          path: build/*.dmg
          if-no-files-found: error
